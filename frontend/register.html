<!DOCTYPE html>
<html>
<head>
    <title>OTMS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-container">
    <div class="auth-left">
        <h1>ONLINE TASK MANAGMENT SYSTEM</h1>
        <p>Create your account to get started</p>
    </div>

    <div class="auth-right">
        <h2>Register</h2>

        <input id="name" type="text" placeholder="Name">
        <input id="email" type="text" placeholder="Email">
        <input id="password" type="password" placeholder="Password">

        <button class="primary-btn" onclick="register()">Register</button>

        <p>Already have account? <a href="login.html">Login</a></p>
    </div>
</div>

<script>
async function register() {
    const name = document.getElementById("name").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const isLocalFrontend =
        window.location.protocol === "file:" ||
        ["localhost", "127.0.0.1"].includes(window.location.hostname) &&
            !["5000", "8888"].includes(window.location.port);
    const apiBase = isLocalFrontend ? "http://localhost:5000" : "";

    try {
        const res = await fetch(`${apiBase}/api/auth/register`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ name, email, password })
        });
        const data = await res.json();

        if (!res.ok) {
            throw new Error(data.msg || data.error || "Registration failed");
        }

        alert("Registered successfully");
        window.location.href = "login.html";
    } catch (error) {
        alert(error.message || "Registration failed");
    }
}
</script>

</body>
</html>
