<!DOCTYPE html>
<html>
<head>
    <title>OTMS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="auth-container">
    <div class="auth-left">
        <h1>ONLINE TASK MANAGMENT SYSTEM</h1>
        <p>Login to get started</p>
    </div>

    <div class="auth-right">
        <h2>Login</h2>

        <input id="email" type="text" placeholder="Email">
        <input id="password" type="password" placeholder="Password">

        <button class="primary-btn" onclick="login()">Login</button>

        <p>Don't have account? <a href="register.html">Register</a></p>
    </div>
</div>

<script>
async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const isLocalFrontend =
        window.location.protocol === "file:" ||
        ["localhost", "127.0.0.1"].includes(window.location.hostname) &&
            !["5000", "8888"].includes(window.location.port);
    const apiBase = isLocalFrontend ? "http://localhost:5000" : "";

    try {
        const res = await fetch(`${apiBase}/api/auth/login`, {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok || !data.token) {
            throw new Error(data.msg || data.error || "Login failed");
        }

        localStorage.setItem("token", data.token);
        window.location.href = "dashboard.html";
    } catch (error) {
        alert(error.message || "Login failed");
    }
}
</script>

</body>
</html>
