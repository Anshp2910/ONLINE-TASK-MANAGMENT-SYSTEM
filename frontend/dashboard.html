<!DOCTYPE html>
<html>
<head>
    <title>OTMS</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main">

    <div class="sidebar">
        <h2>ONLINE TASK MANAGMENT SYSTEM</h2>
        <p>Manage your tasks</p>
        <button class="btn delete-btn" onclick="logout()">Logout</button>
    </div>

    <div class="content">

        <h1>Dashboard</h1>

        <div class="stats">
            <div class="stat-box">Total<br><b id="total">0</b></div>
            <div class="stat-box">Completed<br><b id="completed">0</b></div>
            <div class="stat-box">Pending<br><b id="pending">0</b></div>
        </div>

        <div class="card">
            <h2>Add Task</h2>
            <div class="form-row">
                <input id="title" placeholder="Task Title">
                <input id="desc" placeholder="Task Description">
                <select id="category">
                    <option value="General">General</option>
                    <option value="Work">Work</option>
                    <option value="Personal">Personal</option>
                    <option value="Shopping">Shopping</option>
                    <option value="Health">Health</option>
                    <option value="Other">Other</option>
                </select>
            </div>
            <button class="primary-btn" onclick="addTask()">Add Task</button>
        </div>

        <div class="card">
            <h2>Your Tasks</h2>
            <div id="taskList"></div>
        </div>

    </div>

</div>

<div id="toast-container"></div>

<script src="app.js"></script>
</body>
</html>
