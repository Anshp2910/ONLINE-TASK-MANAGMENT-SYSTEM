[build]
publish = "frontend"
functions = "netlify/functions"

[[redirects]]
from = "/api/auth/register"
to = "/.netlify/functions/auth-register"
status = 200
force = true

[[redirects]]
from = "/api/auth/login"
to = "/.netlify/functions/auth-login"
status = 200
force = true

[[redirects]]
from = "/api/tasks"
to = "/.netlify/functions/tasks"
status = 200
force = true

[[redirects]]
from = "/api/tasks/*"
to = "/.netlify/functions/tasks/:splat"
status = 200
force = true

[[redirects]]
from = "/*"
to = "/index.html"
status = 200
